<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>nw-edit v2 operations console</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500&family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #f3f5f6;
      --ink: #1f2430;
      --card: #ffffff;
      --accent: #0b6a63;
      --accent-2: #3b6ea0;
      --line: #d8dde3;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "IBM Plex Sans", "Noto Sans JP", "Hiragino Kaku Gothic ProN", "Yu Gothic UI", sans-serif;
      color: var(--ink);
      line-height: 1.5;
      text-rendering: optimizeLegibility;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      background:
        radial-gradient(circle at 82% 12%, #dbeeea 0, transparent 36%),
        radial-gradient(circle at 10% 92%, #e6edf5 0, transparent 30%),
        var(--bg);
      min-height: 100vh;
    }
    .wrap {
      max-width: 1160px;
      margin: 0 auto;
      padding: clamp(14px, 2.2vw, 28px);
      display: flex;
      flex-direction: column;
      gap: 16px;
    }
    .head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      background: rgba(255, 255, 255, 0.88);
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 12px 14px;
      backdrop-filter: blur(3px);
    }
    .head h1 {
      margin: 0;
      font-size: clamp(1.1rem, 1.8vw, 1.65rem);
      letter-spacing: 0.005em;
    }
    .panel {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 16px;
      box-shadow: 0 6px 18px rgba(31, 36, 48, 0.05);
    }
    .grid {
      display: grid;
      gap: 14px;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      align-items: start;
    }
    .field-wide {
      grid-column: span 2;
    }
    .nav {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }
    .nav button[aria-pressed="true"] {
      outline: 2px solid #0b4b45;
      outline-offset: 1px;
    }
    .page {
      display: none;
    }
    .page.active {
      display: block;
    }
    label {
      display: block;
      font-size: 0.87rem;
      margin-bottom: 6px;
      opacity: 0.8;
      font-weight: 500;
    }
    input, textarea, select {
      width: 100%;
      padding: 10px 12px;
      border-radius: 10px;
      border: 1px solid var(--line);
      font: inherit;
      font-size: 0.94rem;
      color: inherit;
      background: #fff;
    }
    input, select { min-height: 40px; }
    input:focus-visible, textarea:focus-visible, select:focus-visible, button:focus-visible {
      outline: 2px solid #1f6fba;
      outline-offset: 1px;
    }
    textarea { min-height: 90px; resize: vertical; }
    .btn-row { display: flex; gap: 10px; flex-wrap: wrap; }
    .checkbox-row {
      display: flex;
      align-items: center;
      gap: 10px;
      margin: 10px 0 12px;
      opacity: 1;
    }
    .checkbox-row input {
      width: auto;
      min-height: 0;
      margin: 0;
    }
    .device-select-wrap {
      border: 1px solid var(--line);
      border-radius: 10px;
      padding: 10px;
      background: #fbfcfd;
      margin-bottom: 12px;
    }
    .device-select-list {
      display: grid;
      gap: 6px;
      max-height: 180px;
      overflow: auto;
      margin-top: 8px;
    }
    .device-option {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 0.9rem;
    }
    .device-option input {
      width: auto;
      min-height: 0;
      margin: 0;
    }
    .hidden {
      display: none !important;
    }
    .import-status {
      display: grid;
      gap: 6px;
      margin-top: 8px;
    }
    progress {
      width: 100%;
      height: 10px;
    }
    .error-box {
      border: 1px solid #efc7c7;
      background: #fff7f7;
      color: #7f1d1d;
      border-radius: 8px;
      padding: 8px 10px;
      font-size: 0.86rem;
    }
    .split {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
    }
    @media (max-width: 900px) {
      .split { grid-template-columns: 1fr; }
    }
    .muted { opacity: 0.72; font-size: 0.86rem; }
    button {
      border: none;
      border-radius: 999px;
      padding: 10px 18px;
      font: inherit;
      font-weight: 700;
      cursor: pointer;
    }
    .primary { background: var(--accent); color: white; }
    .secondary { background: var(--accent-2); color: white; }
    pre {
      margin: 0;
      padding: 12px;
      border-radius: 10px;
      background: #151923;
      color: #e5e7eb;
      max-height: 300px;
      overflow: auto;
      font-size: 0.86rem;
      font-family: "IBM Plex Mono", ui-monospace, "SFMono-Regular", Menlo, Consolas, monospace;
      white-space: pre-wrap;
      word-break: break-word;
    }
    .history-list {
      display: grid;
      gap: 8px;
      max-height: 360px;
      overflow: auto;
    }
    .history-item {
      border: 1px solid var(--line);
      border-radius: 10px;
      padding: 10px;
      background: #fff;
      cursor: pointer;
    }
    .history-item:hover {
      border-color: #98b3d0;
      background: #f8fbff;
    }
    @media (max-width: 980px) {
      .grid { grid-template-columns: repeat(2, minmax(0, 1fr)); }
      .field-wide { grid-column: span 2; }
    }
    @media (max-width: 700px) {
      .grid { grid-template-columns: 1fr; }
      .field-wide { grid-column: span 1; }
      .panel { padding: 14px; }
      .head { align-items: flex-start; flex-direction: column; }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="head">
      <h1>nw-edit v2 operations console</h1>
      <div id="status">idle</div>
    </div>

    <section class="panel grid">
      <div>
        <label for="apiBase">API Base</label>
        <input id="apiBase" value="http://127.0.0.1:8010" />
      </div>
      <div>
        <label for="creator">Creator</label>
        <input id="creator" value="local" />
      </div>
      <div>
        <label for="jobName">Job Name</label>
        <input id="jobName" value="v2 demo rollout" />
      </div>
      <div class="field-wide">
        <label for="globalVars">Global Vars (JSON)</label>
        <textarea id="globalVars">{"timezone":"Asia/Tokyo"}</textarea>
      </div>
    </section>

    <section class="panel nav" aria-label="v2 pages">
      <button class="secondary nav-btn" data-page="import" aria-pressed="true">Import</button>
      <button class="secondary nav-btn" data-page="create" aria-pressed="false">Create</button>
      <button class="secondary nav-btn" data-page="monitor" aria-pressed="false">Monitor</button>
      <button class="secondary nav-btn" data-page="history" aria-pressed="false">History</button>
      <button class="secondary nav-btn" data-page="detail" aria-pressed="false">Detail</button>
    </section>

    <section class="panel page active" data-page="import">
      <label for="csvInput">CSV Import (host,port,device_type,username,password,name,verify_cmds,host_vars)</label>
      <textarea id="csvInput">host,port,device_type,username,password,name,verify_cmds,host_vars
10.0.0.1,22,cisco_ios,admin,pass,edge-1,show run,"{""hostname"":""edge-1""}"
10.0.0.2,22,cisco_ios,admin,pass,edge-2,show ip interface brief,"{""hostname"":""edge-2""}"</textarea>
      <div class="btn-row">
        <button class="secondary" id="importBtn" title="Import devices from the CSV text above and validate each row.">Import CSV</button>
        <button class="secondary" id="refreshDevicesBtn" title="Refresh the currently stored imported device list from backend memory.">Refresh Devices</button>
      </div>
      <div class="import-status">
        <progress id="importProgress" class="hidden"></progress>
        <div id="importErrors" class="error-box hidden"></div>
      </div>
      <p class="muted" id="deviceCount">imported devices: 0</p>
    </section>

    <section class="panel page" data-page="create">
      <label class="checkbox-row"><input type="checkbox" id="useImported" checked /> Use imported devices when running</label>
      <div class="device-select-wrap">
        <div class="btn-row">
          <button class="secondary" id="selectAllImportedBtn" type="button">Select All Imported</button>
          <button class="secondary" id="clearImportedSelectionBtn" type="button">Clear Selection</button>
        </div>
        <div class="muted" id="importedDeviceHint">Imported target candidates: 0</div>
        <div id="importedDeviceList" class="device-select-list"></div>
      </div>
      <label for="devices">Ad-hoc Devices (host:port per line, used when imported list is disabled)</label>
      <textarea id="devices">10.0.0.1:22
10.0.0.2:22
10.0.0.3:22</textarea>
      <label class="checkbox-row"><input type="checkbox" id="enablePresetMode" /> Enable Preset Mode (optional)</label>
      <div id="presetPanel" class="hidden">
        <label for="osModelSelect">Target OS Model</label>
        <select id="osModelSelect">
          <option value="">(not selected)</option>
        </select>
        <label for="presetSelect">Execution Preset</label>
        <select id="presetSelect">
          <option value="">(not selected)</option>
        </select>
      </div>
      <label for="commands">Commands (one line each)</label>
      <textarea id="commands">show version
show ip interface brief</textarea>
      <label for="verifyCommands">Verify Commands (one line each)</label>
      <textarea id="verifyCommands"></textarea>
      <div class="btn-row">
        <button class="primary" id="runBtn">Create + Run</button>
        <button class="primary" id="runAsyncBtn">Create + Run Async</button>
      </div>
    </section>

    <section class="panel page" data-page="monitor">
      <div class="btn-row">
        <button class="secondary" id="pauseBtn">Pause Active</button>
        <button class="secondary" id="resumeBtn">Resume Active</button>
        <button class="secondary" id="cancelBtn">Cancel Active</button>
        <button class="secondary" id="refreshActiveBtn">Refresh Active</button>
      </div>
      <p class="muted" id="activeSummary">active job: none</p>
      <label>Activity Log</label>
      <pre id="log"></pre>
      <div class="btn-row" style="margin-top: 10px;">
        <button class="secondary" id="clearBtn">Clear Logs</button>
      </div>
    </section>

    <section class="panel page" data-page="history">
      <div class="btn-row">
        <button class="secondary" id="listJobsBtn">Refresh Jobs</button>
      </div>
      <label>Job History</label>
      <div id="history" class="history-list"></div>
    </section>

    <section class="panel page" data-page="detail">
      <p class="muted" id="detailMeta">No job selected</p>
      <label for="detailData">Selected Job Result</label>
      <pre id="detailData"></pre>
    </section>
  </div>

  <script type="module" src="./app.js"></script>
</body>
</html>
