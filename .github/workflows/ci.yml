name: CI

on:
  push:
    branches: [ main, develop, copilot/** ]
    paths-ignore:
      - '*.md'
      - '**/*.md'
      - 'docs/**'
  pull_request:
    branches: [ main, develop ]
    paths-ignore:
      - '*.md'
      - '**/*.md'
      - 'docs/**'

# Enforce least privilege for GITHUB_TOKEN across all jobs in this workflow.
permissions:
  contents: read

# Cancel superseded runs on the same PR or branch to avoid wasted minutes.
concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      with:
        persist-credentials: false

    - name: Set up Python
      uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
      with:
        python-version: '3.12'
        cache: 'pip'
        cache-dependency-path: 'backend_v2/requirements-dev.txt'

    - name: Install dependencies
      run: pip install -r backend_v2/requirements-dev.txt

    - name: Run black
      run: black --check backend_v2/app backend_v2/tests

    - name: Run flake8
      run: flake8 backend_v2/app backend_v2/tests --max-line-length=120 --extend-ignore=E203,W503

    - name: Run mypy (backend_v2)
      run: mypy --explicit-package-bases backend_v2/app

    - name: Run py_compile smoke check
      run: |
        PYTHONPYCACHEPREFIX=.pycache python -m py_compile \
          backend_v2/app/api/main.py \
          backend_v2/app/application/execution_engine.py

  test:
    name: Test
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      with:
        persist-credentials: false

    - name: Set up Python
      uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
      with:
        python-version: '3.12'
        cache: 'pip'
        cache-dependency-path: 'backend_v2/requirements-dev.txt'

    - name: Install dependencies
      run: pip install -r backend_v2/requirements-dev.txt

    - name: Run unit tests
      run: PYTHONPATH=. pytest backend_v2/tests/unit -v --cov=backend_v2/app --cov-report=xml --cov-report=term

    - name: Upload coverage
      if: always()
      uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
      with:
        name: coverage-report
        path: coverage.xml
        retention-days: 7

  # Docker build and integration tests are expensive; run only on pushes to
  # main/develop (i.e. after merge), not on every PR or feature-branch push.
  build:
    name: Build Docker Image
    runs-on: ubuntu-latest
    timeout-minutes: 30
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop')

    steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      with:
        persist-credentials: false

    - name: Build Docker image
      run: docker build -t nw-edit:latest .

    - name: Test Docker image
      run: docker run --rm nw-edit:latest python -c "import backend_v2.app.api.main; print('OK')"

  integration:
    name: Integration Tests
    runs-on: ubuntu-latest
    timeout-minutes: 30
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop')

    steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      with:
        persist-credentials: false

    - name: Set up Python
      uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
      with:
        python-version: '3.12'
        cache: 'pip'
        cache-dependency-path: 'backend_v2/requirements-dev.txt'

    - name: Install dependencies
      run: pip install -r backend_v2/requirements-dev.txt

    - name: Start mock SSH server
      run: |
        docker compose --profile test up -d mock-ssh
        sleep 10

    - name: Run integration tests
      run: PYTHONPATH=. pytest backend_v2/tests/integration -v -m integration

    - name: Stop services
      if: always()
      run: docker compose --profile test down
